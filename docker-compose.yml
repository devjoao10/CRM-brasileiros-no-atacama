version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: crm_postgres
    restart: always
    environment:
      POSTGRES_DB: crm_atacama
      POSTGRES_USER: ${POSTGRES_USER:-crm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD no .env}
      # Senha do user read-only (criado pelo init.sql)
      CRM_READONLY_PASSWORD: ${CRM_READONLY_PASSWORD:?Defina CRM_READONLY_PASSWORD no .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Scripts de inicialização (executados na PRIMEIRA vez que o container sobe)
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./docker/postgres/init-hardening.sh:/docker-entrypoint-initdb.d/02-hardening.sh:ro
      # Configuração customizada de segurança
      - ./docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./docker/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    command: >
      postgres
      -c config_file=/etc/postgresql/postgresql.conf
      -c hba_file=/etc/postgresql/pg_hba.conf
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm_user} -d crm_atacama"]
      interval: 5s
      timeout: 5s
      retries: 5
    # Sem port mapping externo — banco acessível APENAS dentro do Docker

  crm:
    build: .
    container_name: crm_app
    restart: always
    # WP-OPS-01: sem port mapping no host — acesso SOMENTE via Traefik (rede Docker).
    # Remove o bypass do TLS que existia ao publicar 8000 direto no host.
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health').status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ENVIRONMENT=production
      # App usa crm_user (owner) — pode criar tabelas + DML
      - DATABASE_URL=postgresql://${POSTGRES_USER:-crm_user}:${POSTGRES_PASSWORD}@postgres:5432/crm_atacama
      # IA usa user read-only — APENAS SELECT, timeout 10s, max 5 conexões
      - DATABASE_READONLY_URL=postgresql://crm_readonly:${CRM_READONLY_PASSWORD}@postgres:5432/crm_atacama
      - SECRET_KEY=${SECRET_KEY:?Defina SECRET_KEY no .env}
      - ADMIN_INITIAL_PASSWORD=${ADMIN_INITIAL_PASSWORD:?Defina ADMIN_INITIAL_PASSWORD no .env}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - INTERNAL_AI_AUTH_SECRET=${INTERNAL_AI_AUTH_SECRET:-}
      - CONVERSAS_BASE_URL=http://conversas:8001
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.crm.rule=Host(`crm.crmbrasileirosnoatacama.cloud`)"
      - "traefik.http.routers.crm.entrypoints=websecure"
      - "traefik.http.routers.crm.tls.certresolver=letsencrypt"
      - "traefik.http.services.crm.loadbalancer.server.port=8000"

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n_server
    restart: always
    expose:
      - "5678"
    environment:
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - NODE_ENV=production
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://localhost:5678/}
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - TZ=America/Sao_Paulo
      - N8N_SECURE_COOKIE=true
      - N8N_RESTRICT_ENVIRONMENT_VARIABLES_ACCESS=false
      # Meta Cloud API — usado pelos workflows de WhatsApp
      - META_ACCESS_TOKEN=${META_ACCESS_TOKEN:-}
      - META_PHONE_NUMBER_ID=${META_PHONE_NUMBER_ID:-}
      - ADMIN_WHATSAPP=${ADMIN_WHATSAPP:-5551990119605}
    volumes:
      - n8n_data:/home/node/.n8n
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.rule=Host(`n8n.crmbrasileirosnoatacama.cloud`)"
      - "traefik.http.routers.n8n.entrypoints=websecure"
      - "traefik.http.routers.n8n.tls.certresolver=letsencrypt"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"

  conversas:
    build: ./conversas
    container_name: conversas_app
    restart: always
    expose:
      - "8001"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-crm_user}:${POSTGRES_PASSWORD}@postgres:5432/crm_atacama
      - SECRET_KEY=${SECRET_KEY}
      - CRM_BASE_URL=http://crm:8000
      - N8N_BASE_URL=http://n8n:5678
      - N8N_AGENT_ENABLED=${N8N_AGENT_ENABLED:-true}
      - META_VERIFY_TOKEN=${META_VERIFY_TOKEN:-}
      - META_ACCESS_TOKEN=${META_ACCESS_TOKEN:-}
      - META_PHONE_NUMBER_ID=${META_PHONE_NUMBER_ID:-}
      - META_WABA_ID=${META_WABA_ID:-}
      # OPS-CONV-MEDIA-01 (C2): webhook em producao EXIGE HMAC — sem esta
      # variavel o Conversas responde 500 a todo POST da Meta.
      - META_APP_SECRET=${META_APP_SECRET:-}
      # OPS-CONV-MEDIA-01 (C1): espelho local de midia em volume PERSISTENTE
      # (sem isso os arquivos morrem no rebuild do container).
      - CONVERSAS_MEDIA_DIR=/app/data/media
    volumes:
      - conversas_media:/app/data/media
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.conversas.rule=Host(`conversas.crmbrasileirosnoatacama.cloud`)"
      - "traefik.http.routers.conversas.entrypoints=websecure"
      - "traefik.http.routers.conversas.tls.certresolver=letsencrypt"
      - "traefik.http.services.conversas.loadbalancer.server.port=8001"

volumes:
  pgdata:
  n8n_data:
  conversas_media:
