version: '3.8'

services:
  crm:
    build: .
    container_name: crm_app
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - ENVIRONMENT=production
    # Como o seu banco de dados atual é SQLite (crm_atacama.db), ele continuará funcionando no volume mapeado
    # Se formos migrar para PostgreSQL, adicionaremos o container aqui depois.
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.crm.rule=Host(`crm.crmbrasileirosnoatacama.cloud`)"
      - "traefik.http.routers.crm.entrypoints=websecure"
      - "traefik.http.routers.crm.tls.certresolver=letsencrypt"
      - "traefik.http.services.crm.loadbalancer.server.port=8000"
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n_server
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=187.127.24.242 
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://187.127.24.242:5678/
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - N8N_SECURE_COOKIE=false
    volumes:
      - n8n_data:/home/node/.n8n
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.rule=Host(`n8n.crmbrasileirosnoatacama.cloud`)"
      - "traefik.http.routers.n8n.entrypoints=websecure"
      - "traefik.http.routers.n8n.tls.certresolver=letsencrypt"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"

volumes:
  n8n_data:
