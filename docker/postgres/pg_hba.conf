# ============================================================
# pg_hba.conf — Controle de Acesso por Host
# ============================================================
# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Superuser (admin) — apenas conexão local
local   all             all                                     scram-sha-256

# App user — apenas da rede Docker interna
host    crm_atacama     crm_app         172.16.0.0/12           scram-sha-256
host    crm_atacama     crm_app         192.168.0.0/16          scram-sha-256
host    crm_atacama     crm_app         10.0.0.0/8              scram-sha-256

# Read-only user — apenas da rede Docker interna
host    crm_atacama     crm_readonly    172.16.0.0/12           scram-sha-256
host    crm_atacama     crm_readonly    192.168.0.0/16          scram-sha-256
host    crm_atacama     crm_readonly    10.0.0.0/8              scram-sha-256

# Owner do banco (para migrations/setup) — apenas Docker
host    crm_atacama     crm_user        172.16.0.0/12           scram-sha-256
host    crm_atacama     crm_user        192.168.0.0/16          scram-sha-256
host    crm_atacama     crm_user        10.0.0.0/8              scram-sha-256

# BLOQUEAR TUDO MAIS — nenhuma outra conexão é permitida
host    all             all             0.0.0.0/0               reject
host    all             all             ::/0                    reject
