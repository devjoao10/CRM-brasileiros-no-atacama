# ============================================================
# PostgreSQL Custom Configuration — Segurança
# ============================================================

# --- Conexões ---
max_connections = 50                  # Limitar total de conexões
superuser_reserved_connections = 3    # Reservar para o admin

# --- Autenticação ---
password_encryption = scram-sha-256   # Criptografia forte (não md5)

# --- Logging (Auditoria) ---
log_connections = on                  # Logar toda conexão nova
log_disconnections = on               # Logar desconexões
log_statement = 'ddl'                 # Logar comandos DDL (CREATE/DROP/ALTER)
log_duration = off                    # Não logar duração (verbose demais)
log_min_duration_statement = 5000     # Logar queries que demorem > 5 segundos
log_line_prefix = '%t [%p] %u@%d '   # Timestamp, PID, user@database

# --- Segurança de Rede ---
listen_addresses = '*'                # Aceitar conexões de dentro do Docker
ssl = off                             # SSL interno no Docker não é necessário (Traefik cuida do HTTPS)

# --- Performance Básica ---
shared_buffers = 128MB                # Cache de dados em memória
work_mem = 4MB                        # Memória por operação de sort/hash
maintenance_work_mem = 64MB           # Memória para VACUUM, CREATE INDEX
effective_cache_size = 256MB          # Estimativa de cache do SO

# --- Proteção contra queries pesadas ---
statement_timeout = '60s'             # Timeout global (override por user já definido)
idle_in_transaction_session_timeout = '300s'  # Matar sessões idle em transação
