<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Templates — Conversas</title>
    <link rel="stylesheet" href="/static/css/conversas.css?v=conv-mobile-resp-02">
</head>
<body>
    <div class="page-layout">
        <!-- Sidebar Nav -->
        <aside class="page-sidebar">
            <div class="page-sidebar-header">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="#fff"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12z"/></svg>
                </div>
                <h1>Conversas</h1>
            </div>
            <nav class="page-nav">
                <a href="/" class="page-nav-item">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12zM7 9h2v2H7zm4 0h2v2h-2zm4 0h2v2h-2z"/></svg>
                    Conversas
                </a>
                <a href="/templates" class="page-nav-item active">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zM7 7h10v2H7zm0 4h10v2H7zm0 4h7v2H7z"/></svg>
                    Templates
                </a>
                <a href="/settings" class="page-nav-item">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
                    Configuracoes
                </a>
            </nav>
            <div class="page-sidebar-footer">
                <button id="btnLogout" class="page-nav-item" style="border:none;background:none;width:100%;text-align:left;cursor:pointer;">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
                    Sair
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="page-content">
            <div class="page-header">
                <!-- CONV-MOBILE-RESPONSIVE-02: abre o menu (drawer) no mobile -->
                <button class="page-menu-btn" id="pageMenuBtn" title="Abrir menu">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
                </button>
                <div>
                    <h2>Templates de Mensagem</h2>
                    <p class="page-subtitle">Gerencie templates para envio via WhatsApp Business API</p>
                </div>
                <div class="page-header-actions">
                    <button class="btn-secondary" id="btnSyncTemplates" title="Sincronizar status com Meta API">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>
                        Sincronizar com Meta
                    </button>
                    <button class="btn-primary" id="btnNewTemplate">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                        Novo Template
                    </button>
                </div>
            </div>

            <!-- Filters -->
            <div class="page-filters">
                <div class="filter-group">
                    <select id="filterStatus" class="filter-select">
                        <option value="">Todos os status</option>
                        <option value="APPROVED">Aprovados</option>
                        <option value="PENDING">Pendentes</option>
                        <option value="REJECTED">Rejeitados</option>
                    </select>
                    <select id="filterCategory" class="filter-select">
                        <option value="">Todas as categorias</option>
                        <option value="UTILITY">Utilidade</option>
                        <option value="MARKETING">Marketing</option>
                        <option value="AUTHENTICATION">Autenticacao</option>
                    </select>
                </div>
                <input type="text" id="searchTemplates" class="filter-search" placeholder="Buscar template...">
            </div>

            <!-- Templates Grid -->
            <div class="templates-grid" id="templatesGrid">
                <!-- Populated by JS -->
            </div>
        </main>
    </div>

    <!-- Modal: Create/Edit Template -->
    <div class="modal-overlay" id="modalOverlay" style="display:none;">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">Novo Template</h3>
                <button class="modal-close" id="modalClose">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                </button>
            </div>
            <form id="templateForm">
                <div class="modal-body">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="tplName">Nome (snake_case)</label>
                            <input type="text" id="tplName" required placeholder="ex: boas_vindas">
                        </div>
                        <div class="form-group">
                            <label for="tplCategory">Categoria</label>
                            <select id="tplCategory" required>
                                <option value="UTILITY">Utilidade</option>
                                <option value="MARKETING">Marketing</option>
                                <option value="AUTHENTICATION">Autenticacao</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="tplLanguage">Idioma</label>
                            <select id="tplLanguage">
                                <option value="pt_BR">Portugues (BR)</option>
                                <option value="en_US">English (US)</option>
                                <option value="es">Espanol</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="tplHeaderType">Tipo de Header</label>
                            <select id="tplHeaderType">
                                <option value="">Nenhum</option>
                                <option value="TEXT">Texto</option>
                                <option value="IMAGE">Imagem</option>
                                <option value="VIDEO">Video</option>
                                <option value="DOCUMENT">Documento</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group" id="headerTextGroup">
                        <label for="tplHeaderText">Texto do Header</label>
                        <input type="text" id="tplHeaderText" placeholder="Opcional — maximo 60 caracteres" maxlength="60">
                    </div>
                    <div class="form-group">
                        <label for="tplBody">Corpo da mensagem</label>
                        <textarea id="tplBody" rows="4" required placeholder="Ola {{1}}! Sua reserva #{{2}} esta confirmada." maxlength="1024"></textarea>
                        <small class="form-hint">Use {{1}}, {{2}}, etc. para variaveis. Maximo 1024 caracteres. <span id="bodyCharCount">0</span>/1024</small>
                    </div>
                    <div class="form-group">
                        <label for="tplFooter">Rodape</label>
                        <input type="text" id="tplFooter" placeholder="Opcional — ex: Brasileiros no Atacama" maxlength="60">
                    </div>
                    <div class="form-group">
                        <label for="tplSampleValues">Valores de exemplo (para aprovacao Meta)</label>
                        <textarea id="tplSampleValues" rows="2" placeholder='{"body": ["Joao", "12345"]}'></textarea>
                        <small class="form-hint">JSON com valores de exemplo para cada variavel. Obrigatorio para aprovacao.</small>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" id="btnCancelTemplate">Cancelar</button>
                    <button type="submit" class="btn-primary" id="btnSaveTemplate">Salvar Template</button>
                </div>
            </form>
        </div>
    </div>

    <!-- CONV-MOBILE-RESPONSIVE-02: backdrop do drawer mobile (toque fecha) -->
    <div class="page-drawer-backdrop" id="pageDrawerBackdrop"></div>

    <script src="/static/js/auth.js"></script>
    <script src="/static/js/templates.js"></script>
    <script src="/static/js/page-shell.js?v=conv-mobile-resp-02"></script>
</body>
</html>
