<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CRM Brasileiros no Atacama - Sistema de Gestão Interno">
    <title>Login — CRM Brasileiros no Atacama</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat+Brush&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/static/css/variables.css">
    <link rel="stylesheet" href="/static/css/login.css?v=3">
    <link rel="icon" href="/static/img/logo.png" type="image/png">
</head>
<body>
    <div class="login-container">

        <!-- Left Panel — Branding (original) -->
        <div class="login-brand">
            <div class="brand-content">
                <div class="brand-logo">
                    <img src="/static/img/logo.png" alt="Brasileiros no Atacama">
                </div>
                <h1 class="brand-title">
                    Brasileiros<br>
                    <span style="font-size: 0.85em;">no Atacama</span>
                </h1>
                <p class="brand-subtitle">
                    Sistema de gestão interno para transformar sua operação
                </p>
            </div>

            <!-- Mountain SVG decoration -->
            <div class="mountain-decoration">
                <svg viewBox="0 0 1200 120" preserveAspectRatio="none" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M0 120L200 60L400 90L600 30L800 75L1000 45L1200 80L1200 120L0 120Z" fill="rgba(163,117,84,0.2)"/>
                    <path d="M0 120L150 80L350 100L550 50L750 85L950 55L1200 90L1200 120L0 120Z" fill="rgba(54,107,133,0.15)"/>
                    <path d="M0 120L100 95L300 110L500 70L700 100L900 80L1200 105L1200 120L0 120Z" fill="rgba(31,25,21,0.3)"/>
                </svg>
            </div>
        </div>

        <!-- Right Panel — Login Form (redesigned) -->
        <div class="login-form-panel">
            <div class="login-form-wrapper">

                <!-- Mobile Logo -->
                <div class="mobile-logo">
                    <img src="/static/img/logo.png" alt="Brasileiros no Atacama">
                    <div class="mobile-brand-name">Brasileiros no Atacama</div>
                </div>

                <div class="login-form-header">
                    <p class="login-eyebrow">CRM Interno</p>
                    <h2>Entrar</h2>
                    <p class="login-sub">Acesse o painel de gestão</p>
                </div>

                <!-- Alert -->
                <div id="loginAlert" class="login-alert hidden">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                    <span id="alertMessage"></span>
                </div>

                <!-- Form -->
                <form id="loginForm" novalidate>
                    <div class="field-group">
                        <label for="email">E-mail</label>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            placeholder="seu@email.com"
                            autocomplete="email"
                            required
                        >
                    </div>

                    <div class="field-group">
                        <label for="password">Senha</label>
                        <div class="password-wrap">
                            <input
                                type="password"
                                id="password"
                                name="password"
                                placeholder="••••••••"
                                autocomplete="current-password"
                                required
                            >
                            <button type="button" id="togglePassword" aria-label="Mostrar senha">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                    </div>

                    <button type="submit" id="submitBtn" class="btn-submit">
                        <span id="btnText">Entrar</span>
                        <div id="btnSpinner" class="spinner hidden"></div>
                    </button>
                </form>

                <div class="login-footer">
                    © 2026 Brasileiros no Atacama
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/auth.js"></script>
    <script src="/static/js/login.js"></script>
</body>
</html>
