<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Pendências — BNA CRM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/variables.css?v=2">
    <link rel="stylesheet" href="/static/css/base.css?v=2">
    <link rel="stylesheet" href="/static/css/components.css?v=2">
    <link rel="icon" href="/static/img/logo.png" type="image/png">
    
    <style>
        .operational-layout {
            display: flex;
            min-height: 100vh;
        }
        .main-content {
            flex: 1;
            margin-left: 240px;
            display: flex;
            flex-direction: column;
            background: var(--color-bg);
        }
        .top-header {
            height: 56px;
            background: var(--color-surface);
            border-bottom: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 var(--sp-6);
            position: sticky; top: 0;
            z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: var(--sp-3); }
        .page-title {
            font-size: var(--font-size-base);
            font-weight: var(--fw-semibold);
            color: var(--color-text);
        }
        .content-area {
            flex: 1;
            padding: var(--sp-6) var(--sp-8);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--sp-6);
        }
        .pending-card-box {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-xl);
            padding: var(--sp-5);
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 120px);
        }
        .pending-title {
            font-size: var(--font-size-md);
            font-weight: var(--fw-semibold);
            color: var(--color-text);
            margin-bottom: var(--sp-4);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--color-border);
            padding-bottom: var(--sp-3);
        }
        .pending-list {
            display: flex;
            flex-direction: column;
            gap: var(--sp-3);
            overflow-y: auto;
            flex: 1;
        }
        .card-item {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: var(--sp-4);
            transition: all var(--t-fast);
            cursor: pointer;
            box-shadow: var(--shadow-xs);
        }
        .card-item:hover {
            border-color: var(--color-primary);
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }
        .notif-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: var(--sp-3) var(--sp-4);
            background: var(--sidebar-hover-bg);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            gap: var(--sp-3);
        }
    </style>
</head>
<body>
    <div class="operational-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar" style="width: 240px; background: var(--sidebar-bg); border-right: 1px solid var(--sidebar-border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: var(--z-sidebar);">
            <div class="sidebar-header" style="padding: var(--sp-5); border-bottom: 1px solid var(--sidebar-border); display: flex; align-items: center; gap: var(--sp-3); min-height: 56px;">
                <div class="sidebar-logo" style="width: 32px; height: 32px; border-radius: var(--radius-md); overflow: hidden;"><img src="/static/img/logo.png" alt="Logo" style="width:100%; height:100%; object-fit:cover;"></div>
                <div class="sidebar-brand" style="font-size: var(--font-size-sm); font-weight: var(--fw-semibold); color: var(--color-text);">Brasileiros <span style="color: var(--color-primary);">no Atacama</span></div>
            </div>
            <nav class="sidebar-nav" style="flex: 1; padding: var(--sp-3) 0; overflow-y: auto; display: flex; flex-direction: column;">
                <div class="nav-section" style="padding: var(--sp-1) var(--sp-4); margin-top: var(--sp-4);"><div class="nav-section-title" style="font-size: 10px; font-weight: var(--fw-semibold); text-transform: uppercase; color: var(--color-text-4);">Principal</div></div>
                <a href="/dashboard" class="nav-item" style="display: flex; align-items: center; gap: var(--sp-3); padding: 8px var(--sp-4); color: var(--sidebar-text); font-size: var(--font-size-sm); text-decoration: none; border-radius: var(--radius-md); margin: 1px var(--sp-2);"><span>Dashboard</span></a>
                
                <div class="nav-section" style="padding: var(--sp-1) var(--sp-4); margin-top: var(--sp-4);"><div class="nav-section-title" style="font-size: 10px; font-weight: var(--fw-semibold); text-transform: uppercase; color: var(--color-text-4);">CRM</div></div>
                <a href="/leads" class="nav-item" style="display: flex; align-items: center; gap: var(--sp-3); padding: 8px var(--sp-4); color: var(--sidebar-text); font-size: var(--font-size-sm); text-decoration: none; border-radius: var(--radius-md); margin: 1px var(--sp-2);"><span>Leads</span></a>
                <a href="/pipeline" class="nav-item" style="display: flex; align-items: center; gap: var(--sp-3); padding: 8px var(--sp-4); color: var(--sidebar-text); font-size: var(--font-size-sm); text-decoration: none; border-radius: var(--radius-md); margin: 1px var(--sp-2);"><span>Pipeline</span></a>
                
                <div class="nav-section" style="padding: var(--sp-1) var(--sp-4); margin-top: var(--sp-4);"><div class="nav-section-title" style="font-size: 10px; font-weight: var(--fw-semibold); text-transform: uppercase; color: var(--color-text-4);">BNA Operacional</div></div>
                <a href="/operational/boards" class="nav-item" style="display: flex; align-items: center; gap: var(--sp-3); padding: 8px var(--sp-4); color: var(--sidebar-text); font-size: var(--font-size-sm); text-decoration: none; border-radius: var(--radius-md); margin: 1px var(--sp-2);"><span>Esteira de Processos</span></a>
                <a href="/operational/my-pending" class="nav-item active" style="display: flex; align-items: center; gap: var(--sp-3); padding: 8px var(--sp-4); background: var(--sidebar-active-bg); color: var(--sidebar-active-text); font-weight: var(--fw-semibold); font-size: var(--font-size-sm); text-decoration: none; border-radius: var(--radius-md); margin: 1px var(--sp-2);"><span>Minhas Pendências</span></a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <h2 class="page-title">Minhas Pendências Operacionais</h2>
                </div>
            </header>

            <div class="content-area">
                <!-- Assigned Cards Box -->
                <div class="pending-card-box">
                    <div class="pending-title">
                        <span>Cards Designados a Mim</span>
                        <span id="cardsCount" style="font-size: 11px; background: var(--color-bg); padding: 2px 8px; border-radius: 10px;">0</span>
                    </div>
                    <div class="pending-list" id="assignedCardsContainer">
                        <div style="text-align:center; padding:var(--sp-6); color:var(--color-text-3);">Carregando cards...</div>
                    </div>
                </div>

                <!-- Notifications Box -->
                <div class="pending-card-box">
                    <div class="pending-title">
                        <span>Inbox de Notificações</span>
                        <div style="display:flex; align-items:center; gap:8px;">
                            <span id="notifsCount" style="font-size: 11px; background: var(--color-bg); padding: 2px 8px; border-radius: 10px;">0</span>
                            <button class="btn" style="padding: 2px 8px; font-size:10px; background: var(--color-primary-light); color: var(--color-primary);" id="readAllBtn">Ler Todas</button>
                        </div>
                    </div>
                    <div class="pending-list" id="notificationsContainer">
                        <div style="text-align:center; padding:var(--sp-6); color:var(--color-text-3);">Carregando notificações...</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let token = localStorage.getItem("token") || document.cookie.split('; ').find(row => row.startsWith('access_token='))?.split('=')[1];
        if (!token) window.location.href = "/login";

        async function fetchPending() {
            try {
                let response = await fetch("/api/operational/my-pending", {
                    headers: { "Authorization": `Bearer ${token}` }
                });
                if (!response.ok) throw new Error();
                let data = await response.json();
                renderPending(data);
            } catch (e) {
                document.getElementById("assignedCardsContainer").innerHTML = "Erro ao carregar dados.";
                document.getElementById("notificationsContainer").innerHTML = "Erro ao carregar dados.";
            }
        }

        function renderPending(data) {
            // Render Cards
            const cardsContainer = document.getElementById("assignedCardsContainer");
            const cardsCount = document.getElementById("cardsCount");
            cardsContainer.innerHTML = "";
            
            let cards = data.assigned_cards || [];
            cardsCount.innerText = cards.length;
            
            if (cards.length === 0) {
                cardsContainer.innerHTML = "<div style='text-align:center; padding:var(--sp-8); color:var(--color-text-3); font-size:12px;'>Você não tem cards operacionais designados.</div>";
            } else {
                cards.forEach(c => {
                    let div = document.createElement("div");
                    div.className = "card-item";
                    div.onclick = () => window.location.href = `/operational/boards/${c.board_id}`;
                    div.innerHTML = `
                        <div style="font-weight:var(--fw-semibold); font-size:13px; color:var(--color-text); margin-bottom:2px;">${c.title}</div>
                        <div style="font-size:11px; color:var(--color-text-3); margin-bottom:6px;">${c.description || 'Sem descrição.'}</div>
                        <div style="font-size:10px; color:var(--color-text-4); display:flex; justify-content:space-between;">
                            <span>Quadro #${c.board_id}</span>
                            <span>Prazo: ${c.due_date ? new Date(c.due_date).toLocaleDateString('pt-BR') : 'Sem prazo'}</span>
                        </div>
                    `;
                    cardsContainer.appendChild(div);
                });
            }

            // Render Notifications
            const notifsContainer = document.getElementById("notificationsContainer");
            const notifsCount = document.getElementById("notifsCount");
            notifsContainer.innerHTML = "";
            
            let notifs = data.unread_notifications || [];
            notifsCount.innerText = notifs.length;
            
            if (notifs.length === 0) {
                notifsContainer.innerHTML = "<div style='text-align:center; padding:var(--sp-8); color:var(--color-text-3); font-size:12px;'>Você está em dia! Nenhuma notificação pendente.</div>";
            } else {
                notifs.forEach(n => {
                    let div = document.createElement("div");
                    div.className = "notif-item";
                    div.innerHTML = `
                        <div style="display:flex; flex-direction:column; gap:2px; font-size:12px;">
                            <span style="font-weight:var(--fw-medium); color:var(--color-text-2);">${n.message}</span>
                            <span style="font-size:10px; color:var(--color-text-4);">${new Date(n.created_at).toLocaleString('pt-BR')}</span>
                        </div>
                        <button class="btn" style="padding:2px 6px; font-size:9px; background:var(--color-surface); border:1px solid var(--color-border);" onclick="readNotif(${n.id})">Marcar lida</button>
                    `;
                    notifsContainer.appendChild(div);
                });
            }
        }

        async function readNotif(id) {
            let response = await fetch(`/api/operational/notifications/${id}/read`, {
                method: "POST",
                headers: { "Authorization": `Bearer ${token}` }
            });
            if (response.ok) {
                fetchPending();
            }
        }

        document.getElementById("readAllBtn").onclick = async () => {
            let response = await fetch("/api/operational/notifications/read-all", {
                method: "POST",
                headers: { "Authorization": `Bearer ${token}` }
            });
            if (response.ok) {
                fetchPending();
            }
        };

        fetchPending();
    </script>
</body>
</html>
